<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Assignments</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .main-content-wrapper {
            background-color: #f0f8ed;
            min-height: calc(100vh - 56px - 54px); 
        }
        .custom-card {
            background-color: #f0f8ed;
            border: 1px solid #ced4da;
        }
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .btn-danger {
            background-color: #dc3545; 
            border-color: #dc3545;
        }
        .custom-input {
            background-color: transparent;
            border: 1px solid #ced4da;
            height: 50px; 
        }
       
        .btn-clear {
            background-color: #f8f9fa00;
            border: 1px solid #ced4da;
            color: #212529;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" >
        <div class="container-fluid mx-3 px-4" >
            <a class="navbar-brand" href="index.html">Assignments</a>
            <div class="navbar-text text-white ms-3 me-auto">
                Chapter 8 - 14
            </div>
            <form class="d-flex d-none d-md-flex">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light" type="submit" style="color: green; border-color: green;">Search</button>
            </form>
        </div>
    </nav>

    <div class="main-content-wrapper py-5">
        <div class="container">
            
            <h2 class="text-center mb-5 text-dark">
                Chapter # 8 - 14 | Concatenation | Prompts | Iif...else and else if statements
            </h2>
<hr><br>
            <div class="card custom-card mb-5">
                <div class="card-body p-4">
                    <div class="button-container">
                        <button class="btn btn-danger" data-action="concatenate">Concatenate Some Strings</button>
                        <button class="btn btn-danger" data-action="askName">Ask Name From User</button>
                        <button class="btn btn-danger" data-action="comparison">Comparison Operators</button>
                        <button class="btn btn-danger" data-action="ifElse">if else if</button>
                        <button class="btn btn-danger" data-action="testConditions">Testing Sets of Conditions</button>
                        <button class="btn btn-danger" data-action="nestedIf">If Statements Nested</button>
                        <button class="btn btn-danger" data-action="login">Login</button>
                        <button class="btn btn-danger" data-action="check">Check</button>
                    </div>
                </div>
            </div>
<br>
            <div class="mb-5">
                <h3 class="text-center mb-3">Original Statement</h3>
                <div class="form-control custom-input mb-3" style="height: auto; min-height: 60px; word-break: break-word;" >
                    <p class="text-center" id="originalStatement"></p>
                </div>
                <div class="text-center" >
                    <button class="btn btn-clear" id="clearOutput">Clear Statement</button>
                </div>
            </div>

            <div class="mb-4">
                <h3 class="text-center mb-3">Output / Result</h3>
                <div class="form-control custom-input mb-3" style="height: auto; min-height: 60px; word-break: break-word;" >
                    <p class="text-center" id="outputResult"></p>
                </div>
                <div class="text-center">
                    <button class="btn btn-clear" id="clearoutput">Clear Output</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3" >
        <p class="mb-0">&copy; 2026. Assignment1 By <a href="index.html" class="text-white text-decoration-none" target="_blank">Husnain Razzaq</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
