<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Assignment 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar bg-custom-dark py-2">
        <div class="container-fluid px-5 d-flex align-items-center">
            <div class="d-flex align-items-baseline">
                <span class="text-white fs-5 me-3">Assignments</span>
                <span class="text-white-50 small">Chapter 15 - 20</span>
            </div>
            <div class="d-flex gap-2">
                <input class="search-input" type="text" placeholder="Search">
                <button class="search-btn" type="button">Search</button>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1" style="max-width: 1050px;">
        
        <div class="text-center mb-4">
            <h2 class="page-title">Chapter # 15 - 20 | Arrays: It's Methods & for loops</h2>
        </div>
        
        <hr class="mb-4" style="border-color: #b2c5b7;">

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <h4 class="section-title">Input</h4>
                <div class="custom-container d-flex align-items-center" style="min-height: 100px;">
                    <div class="input-group">
                        <input type="text" id="inputValue" class="form-control" placeholder="Type your text here" style="border-color: #ced4da;">
                        <button class="btn btn-outline-secondary bg-white" type="button" onclick="clearInput()">Clear</button>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h4 class="section-title">Original String</h4>
                <div class="string-box shadow-sm" id="originalString">
                   1) Faisalabad &nbsp; 2) Lahore &nbsp; 3) Karachi &nbsp; 4) Islamabad &nbsp; 5) Peshawar &nbsp; 6) Sarghoda &nbsp; 7) Gojra
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <h4 class="section-title">Buttons</h4>
                <div class="custom-container" style="height: 200px; display: flex; flex-direction: column; justify-content: center;">
                    <div class="row g-2 justify-content-center">
                        <div class="col-6"><button class="btn btn-custom-red rounded-1" onclick="simpleAlert()">Simple Alert</button></div>
                        <div class="col-6"><button class="btn btn-custom-red rounded-1" onclick="printMyName()">Print My Name</button></div>
                        <div class="col-6"><button class="btn btn-custom-red rounded-1" onclick="printAllCities()">Print All Cities</button></div>
                        <div class="col-6"><button class="btn btn-custom-red rounded-1" onclick="addCity()">Add Your City In List</button></div>
                        <div class="col-6 mt-2"><button class="btn btn-custom-red rounded-1" onclick="generateTable()">Generate Table</button></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h4 class="section-title">Output / Result</h4>
                <div class="custom-container output-box shadow-sm mb-3" id="outputBox">
                    </div>
                <div class="text-center">
                    <button class="btn btn-clear rounded-1 shadow-sm" onclick="clearOutput()">Clear Output</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-custom-dark text-center py-2 text-white mt-auto">
        <small class="opacity-75">&copy; 2026. Assignments By <strong>Husnain</strong></small>
    </footer>

    <script src="script.js"></script>
</body>
</html>
    <script src="script.js"></script>
</body>
</html>
